<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
   <div class="container center">
     <h1>Product Mgt</h1>
     <p class="subtitle">Spring Boot + JPA + Thymeleaf</p>

     <div class="actions">
       <a class="btn" href="/products">Products List</a>
       <a class="btn" href="/products/new">Add product</a>
     </div>

     <form class="search-form" action="/findProduct" method="POST">
       <label for="search-name">Product name</label>
       <input id="search-name" class="input" type="text" name="name" placeholder="Search by name">
       <button class="btn" type="submit">Search</button>
     </form>
   </div>

</body>
</html>
