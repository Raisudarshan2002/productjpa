<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
  <h1>Add Product</h1>
  <form class="form" action="/products" method="post" enctype="multipart/form-data">
    <div class="form-row">
      <label for="product-name">Product Name</label>
      <input id="product-name" class="input" type="text" name="name">
    </div>
    <div class="form-row">
      <label for="product-price">Price</label>
      <input id="product-price" class="input" type="text" name="price">
    </div>
    <div class="form-row">
      <label for="product-stock">Stock</label>
      <input id="product-stock" class="input" type="text" name="stock">
    </div>
    <div class="form-row">
      <label for="product-description">Description</label>
      <textarea id="product-description" class="input" name="description"></textarea>
    </div>
    <div class="form-row">
      <label for="product-image">Image</label>
      <input id="product-image" class="input" type="file" name="imageFile" accept="image/*">
    </div>
    <div class="form-actions">
      <button class="btn" type="submit">Save</button>
      <a class="btn secondary" href="/products">Go to List</a>
    </div>
  </form>
</div>

</body>
</html>
